services:
  postgres:
    image: postgres:17-alpine
    container_name: stockflow-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: stockflow
      POSTGRES_PASSWORD: stockflow_dev
      POSTGRES_DB: stockflow
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockflow -d stockflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: stockflow-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: stockflow
      DATABASE_PASSWORD: stockflow_dev
      DATABASE_NAME: stockflow
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-in-production-please}
      JWT_EXPIRES_IN: 15m
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
